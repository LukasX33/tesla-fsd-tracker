name: Tesla FSD Tracker Autoupdate

on:
  schedule:
    - cron: '0 2 * * *' # Läuft jede Nacht um 02:00 Uhr
  workflow_dispatch: # Ermöglicht manuellen Start per Klick auf GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-level: '20'

      - name: Scraper-Abhängigkeiten installieren
        run: |
          cd scraper
          npm install

      - name: Scraper ausführen
        env:
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
        run: |
          cd scraper
          node scrape.js

      - name: Änderungen committen und pushen
        run: |
          git config --global user.name "FSD Bot"
          git config --global user.email "bot@fsd-tracker.local"
          git add public/data.json
          git diff-index --quiet HEAD || git commit -m "Bot: data.json aktualisiert via @teslaeurope"
          git push